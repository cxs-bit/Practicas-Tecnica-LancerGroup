version: "3.8"

services:
    mysql:
        image: mysql:8.0
        container_name: mysql_container
        restart: always
        ports:
            - "3307:3306"
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: library_db
            MYSQL_USER: laravel
            MYSQL_PASSWORD: 122333..
        volumes:
            - mysql_data:/var/lib/mysql

volumes:
    mysql_data:
